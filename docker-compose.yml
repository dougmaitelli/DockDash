services:
  dockdash:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dockdash
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - DOCKER_HOST=${DOCKER_HOST:-unix:///var/run/docker.sock}
      - DOCKER_TLS_CERTDIR=${DOCKER_TLS_CERTDIR:-}
      - NETWORK_CIDRS=${NETWORK_CIDRS:-192.168.0.1/24}
      - SCAN_PORTS=${SCAN_PORTS:-}
      - DB_PATH=/app/data/dockdash.db
      - REFRESH_INTERVAL=${REFRESH_INTERVAL:-30000}
      - HEALTH_CHECK_INTERVAL=${HEALTH_CHECK_INTERVAL:-30000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockdash-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  dockdash-data:
